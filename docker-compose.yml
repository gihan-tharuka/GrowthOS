services:
  postgres:
    image: postgres:16-alpine
    container_name: growthos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: growthos
      POSTGRES_PASSWORD: growthos
      POSTGRES_DB: growthos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growthos -d growthos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
